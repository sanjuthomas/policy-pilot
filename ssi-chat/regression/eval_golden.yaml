# Golden eval set with explicit routing and quality thresholds.
#
# Used for offline unit tests, --eval-golden runs, and as stage 1 of the full
# integration suite (before API smoke) so exact denial counts stay seed-deterministic.
# Seed plan matches questions.yaml so truncate+reload keeps counts stable.

version: 1
seed:
  steps:
  - action: run-policy-scenario
  - action: run-payment-policy-scenario
  - action: create-instructions
    count: 5
  - action: submit-instructions
    count: 5
  - action: approve-instructions
    count: 3
  - action: create-payments
    count: 5
  - action: submit-payments
    count: 4
  - action: approve-payments
    count: 2
  - action: reject-payments
    count: 1
  wait:
    min_security_events: 10
    min_multimodal_documents: 15
    timeout_seconds: 300
    poll_interval_seconds: 4
cases:
- id: golden_payment_creator
  mode: payments
  retrieval: deterministic
  tags: [golden, who, creator]
  question: Who created payment {approved_payment_id}?
  expect:
    requires_context: [approved_payment_id]
    require_routing: true
    routing_path: neo4j_direct
    cypher_class: deterministic
    answer_synthesis: formatter
    require_entity_recall: true
    min_answer_length: 5
    answer_contains_any: [created, creator, submitted]

- id: golden_payment_status
  mode: payments
  retrieval: deterministic
  tags: [golden, status]
  question: What is the status of payment {approved_payment_id}?
  expect:
    requires_context: [approved_payment_id]
    require_routing: true
    routing_path: neo4j_direct
    require_entity_recall: true
    answer_contains_any: [approved, status, payment]

- id: golden_events_count_today
  mode: events
  retrieval: graph
  tags: [golden, counts]
  question: How many ALERT events happened today?
  expect:
    require_routing: true
    answer_has_number: true
    # Short count answers share few tokens with graph rows; faithfulness stays low by design.
    min_groundedness: 0.05

- id: golden_events_top_denial_user
  mode: events
  retrieval: deterministic
  tags: [golden, ranking, p0]
  question: Which user triggered the most policy denial alerts this week?
  expect:
    require_routing: true
    routing_path: neo4j_direct
    cypher_class: deterministic
    answer_synthesis: formatter
    min_answer_length: 10
    # Default seed: payment policy denials put pay-101 at the top (2 alerts).
    answer_contains_all: [pay-101]

- id: golden_instruction_status
  mode: instructions
  retrieval: deterministic
  tags: [golden, status]
  question: What is the status of instruction {approved_instruction_id}?
  expect:
    requires_context: [approved_instruction_id]
    require_routing: true
    routing_path: neo4j_direct
    require_entity_recall: true
    answer_contains_any: [approved, status, instruction]

# Bare id must match noun-qualified show (sequence id encodes entity type).
- id: golden_instruction_show_by_id_with_noun
  mode: instructions
  retrieval: deterministic
  tags: [golden, show, id_lookup, regression_guard]
  question: Can you show me the instruction {approved_instruction_id}?
  expect:
    requires_context: [approved_instruction_id]
    require_routing: true
    routing_path: neo4j_direct
    cypher_class: deterministic
    answer_synthesis: formatter
    intent_id: instruction.show_by_id
    require_entity_recall: true
    min_answer_length: 10
    answer_contains_any: [instruction, status, approved, ficc, fx]

- id: golden_instruction_show_by_id_bare
  mode: instructions
  retrieval: deterministic
  tags: [golden, show, id_lookup, regression_guard]
  question: Can you show me {approved_instruction_id}?
  expect:
    requires_context: [approved_instruction_id]
    require_routing: true
    routing_path: neo4j_direct
    cypher_class: deterministic
    answer_synthesis: formatter
    intent_id: instruction.show_by_id
    require_entity_recall: true
    min_answer_length: 10
    answer_contains_any: [instruction, status, approved, ficc, fx]

- id: golden_payment_show_by_id_with_noun
  mode: payments
  retrieval: deterministic
  tags: [golden, show, id_lookup, regression_guard]
  question: Can you show me the payment {approved_payment_id}?
  expect:
    requires_context: [approved_payment_id]
    require_routing: true
    routing_path: neo4j_direct
    cypher_class: deterministic
    answer_synthesis: formatter
    intent_id: payment.show_by_id
    require_entity_recall: true
    min_answer_length: 10
    answer_contains_any: [payment, status, amount, approved]

- id: golden_payment_show_by_id_bare
  mode: payments
  retrieval: deterministic
  tags: [golden, show, id_lookup, regression_guard]
  question: Can you show me {approved_payment_id}?
  expect:
    requires_context: [approved_payment_id]
    require_routing: true
    routing_path: neo4j_direct
    cypher_class: deterministic
    answer_synthesis: formatter
    intent_id: payment.show_by_id
    require_entity_recall: true
    min_answer_length: 10
    answer_contains_any: [payment, status, amount, approved]

# Positive LOB entitlement (must not emit new instruction ALERTs — denial count stays 4).
- id: golden_instruction_view_fo_ficc
  mode: instructions
  retrieval: deterministic
  tags: [golden, view, positive, fo, ficc]
  persona: fo-ficc-101
  question: What is the status of instruction {ficc_standing_instruction_id}?
  expect:
    requires_context: [ficc_standing_instruction_id]
    require_routing: true
    routing_path: neo4j_direct
    require_entity_recall: true
    min_answer_length: 5
    answer_contains_any: [approved, status, instruction, ficc]

- id: golden_instruction_view_mo_covering_ficc
  mode: instructions
  retrieval: deterministic
  tags: [golden, view, positive, mo, ficc]
  persona: pay-101
  question: What is the status of instruction {ficc_standing_instruction_id}?
  expect:
