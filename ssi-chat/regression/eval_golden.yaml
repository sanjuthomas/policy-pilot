# Golden eval set with explicit routing and quality thresholds.
#
# Used for offline unit tests, --eval-golden runs, and as stage 1 of the full
# integration suite (before API smoke) so exact denial counts stay seed-deterministic.
# Seed plan matches questions.yaml so truncate+reload keeps counts stable.

version: 1
seed:
  steps:
  - action: run-policy-scenario
  - action: run-payment-policy-scenario
  - action: create-instructions
    count: 5
  - action: submit-instructions
    count: 5
  - action: approve-instructions
    count: 3
  - action: create-payments
    count: 5
  - action: submit-payments
    count: 4
  - action: approve-payments
    count: 2
  - action: reject-payments
    count: 1
  wait:
    min_security_events: 10
    min_multimodal_documents: 15
    timeout_seconds: 300
    poll_interval_seconds: 4
cases:
- id: golden_payment_creator
  mode: payments
  retrieval: deterministic
  tags: [golden, who, creator]
  question: Who created payment {approved_payment_id}?
  expect:
    requires_context: [approved_payment_id]
    require_routing: true
    routing_path: neo4j_direct
    cypher_class: deterministic
    answer_synthesis: formatter
    require_entity_recall: true
    min_answer_length: 5
    answer_contains_any: [created, creator, submitted]

- id: golden_payment_status
  mode: payments
  retrieval: deterministic
  tags: [golden, status]
  question: What is the status of payment {approved_payment_id}?
  expect:
    requires_context: [approved_payment_id]
    require_routing: true
    routing_path: neo4j_direct
    require_entity_recall: true
    answer_contains_any: [approved, status, payment]

- id: golden_events_count_today
  mode: events
  retrieval: graph
  tags: [golden, counts]
  question: How many ALERT events happened today?
  expect:
    require_routing: true
    answer_has_number: true
    # Short count answers share few tokens with graph rows; faithfulness stays low by design.
    min_groundedness: 0.05

- id: golden_events_top_denial_user
  mode: events
  retrieval: deterministic
  tags: [golden, ranking, p0]
  question: Which user triggered the most policy denial alerts this week?
  expect:
    require_routing: true
    routing_path: neo4j_direct
    cypher_class: deterministic
    answer_synthesis: formatter
    min_answer_length: 10
    # Default seed: payment policy denials put pay-101 at the top (2 alerts).
    answer_contains_all: [pay-101]

- id: golden_instruction_status
  mode: instructions
  retrieval: deterministic
  tags: [golden, status]
  question: What is the status of instruction {approved_instruction_id}?
  expect:
    requires_context: [approved_instruction_id]
    require_routing: true
    routing_path: neo4j_direct
    require_entity_recall: true
    answer_contains_any: [approved, status, instruction]

# Positive LOB entitlement (must not emit new instruction ALERTs — denial count stays 4).
- id: golden_instruction_view_fo_ficc
  mode: instructions
  retrieval: deterministic
  tags: [golden, view, positive, fo, ficc]
  persona: fo-ficc-101
  question: What is the status of instruction {ficc_standing_instruction_id}?
  expect:
    requires_context: [ficc_standing_instruction_id]
    require_routing: true
    routing_path: neo4j_direct
    require_entity_recall: true
    min_answer_length: 5
    answer_contains_any: [approved, status, instruction, ficc]

- id: golden_instruction_view_mo_covering_ficc
  mode: instructions
  retrieval: deterministic
  tags: [golden, view, positive, mo, ficc]
  persona: pay-101
  question: What is the status of instruction {ficc_standing_instruction_id}?
  expect:
    requires_context: [ficc_standing_instruction_id]
    require_routing: true
    routing_path: neo4j_direct
    require_entity_recall: true
    min_answer_length: 5
    answer_contains_any: [approved, status, instruction, ficc]

- id: golden_events_who_approved_payment
  mode: events
  retrieval: graph
  tags: [golden, who, approve]
  question: Who approved payment {approved_payment_id} and why?
  expect:
    requires_context: [approved_payment_id]
    require_routing: true
    require_entity_recall: true
    min_answer_length: 20
    answer_contains_any: [approv, allowed, because, role]

- id: golden_vector_security_summary
  mode: events
  # Tag as graph for path defaults (neo4j_direct|full_rag). Override cypher_class to
  # none: this narrative is full_rag without Cypher. Revisit retrieval: vector +
  # source_channels_any when channel tagging is reliable.
  retrieval: graph
  tags: [golden, vector]
  # Avoid "summarize … alerts" — that matches the deterministic ALERT-list intent.
  question: Write a brief narrative about recent policy denial activity in the audit log.
  expect:
    require_routing: true
    routing_path: full_rag
    cypher_class: none
    min_answer_length: 40
    min_faithfulness: 0.05
    answer_contains_any: [denial, alert, policy]

# ── P0: seed-backed denial counts & alert lists (deterministic formatter) ──
# After golden seed, payment-policy step 6 (pay-203 APPROVE FICC) cannot VIEW
# the FICC instruction (covering_lobs=FX only), so that DENY lands as:
#   3 payment ALERTs (CREATE/SUBMIT/self-APPROVE) + 1 instruction VIEW ALERT.
# Instruction ALERTs total 4: 3 from instruction policy scenario + that spillover.

- id: golden_instruction_denials_count_week
  mode: events
  retrieval: deterministic
  tags: [golden, p0, counts, alerts, instructions]
  question: How many instruction policy denials happened this week?
  expect:
    require_routing: true
    routing_path: neo4j_direct
    cypher_class: deterministic
    answer_synthesis: formatter
    answer_contains_all:
    - There were 4 instruction policy denial events this week.

- id: golden_instruction_denials_list_week
  mode: events
  retrieval: deterministic
  tags: [golden, p0, alerts, instructions, list]
  question: Can you list all instruction denial events for this week?
  expect:
    require_routing: true
    routing_path: neo4j_direct
    cypher_class: deterministic
    answer_synthesis: formatter
    exact_graph_rows: 4
    min_answer_length: 20
    answer_contains_all:
    - ALERT security events (4)
    - Entity ID
    answer_contains_any:
    - instruction
    - -I-

- id: golden_payment_denials_count_today
  mode: events
  retrieval: deterministic
  tags: [golden, p0, counts, alerts, payments]
  question: How many payment policy denial alerts happened today?
  expect:
    require_routing: true
    routing_path: neo4j_direct
    cypher_class: deterministic
    answer_synthesis: formatter
    answer_contains_all:
    - There were 3 payment policy denial events today.

- id: golden_alerts_list_today_entity_ids
  mode: events
  retrieval: deterministic
  tags: [golden, p0, alerts, list]
  question: Can you report all ALERTS today?
  expect:
    require_routing: true
    routing_path: neo4j_direct
    cypher_class: deterministic
    answer_synthesis: formatter
    min_graph_rows: 2
    min_answer_length: 20
    answer_contains_all:
    - Entity ID
    - ALERT
    answer_contains_any:
    - -I-
    - -P-

# ── Issue #63 phase 2: operational chat retrieval LOB scope ──
# Compliance goldens above stay unscoped. FO FX must not see FICC-owned denial events.

- id: golden_fo_fx_instruction_denials_scoped
