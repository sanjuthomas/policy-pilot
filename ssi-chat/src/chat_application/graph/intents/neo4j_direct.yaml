# Neo4j-direct intents: fixed Cypher + formatter (no vector / LLM Cypher / synthesis).
#
# Fields:
#   id          — stable intent name
#   priority    — higher wins when multiple intents match (default 50)
#   modes       — chat search modes where this intent applies
#   match       — regex on the question (case-insensitive)
#   exclude     — optional regex; intent skipped when this matches
#   requires    — optional keys: instruction_id, payment_id, user_id
#   query       — builder key in neo4j_intents.QUERY_BUILDERS
#   formatter   — formatter key in formatting.neo4j.FORMATTERS

intents:
  # ── Instruction by ID ──────────────────────────────────────────────────────
  - id: instruction.creator_by_id
    priority: 100
    modes: [instructions, all]
    match: '\b(who|which user)\s+created\b'
    exclude: '\bapprov'
    requires:
      instruction_id: true
    query: instruction_detail_by_id
    formatter: instruction_creator_by_id

  - id: instruction.status_by_id
    priority: 100
    modes: [instructions, all]
    match: '\b(what is|what''s)\s+the\s+status\b|\bstatus of\b'
    requires:
      instruction_id: true
    query: instruction_detail_by_id
    formatter: instruction_status_by_id

  - id: instruction.creator_and_approver_by_id
    priority: 110
    modes: [instructions, all]
    match: '\bwho\s+created\b.*\bwho\s+approv|\bwho\s+approv.*\bwho\s+created\b'
    requires:
      instruction_id: true
    query: instruction_detail_by_id
    formatter: instruction_creator_and_approver_by_id

  - id: instruction.approver_by_id
    priority: 95
    modes: [instructions, all]
    match: '\bwho\s+approv'
    exclude: '\bwho\s+can\s+approv'
    requires:
      instruction_id: true
    query: instruction_approval_lookup
    formatter: instruction_approver_by_id

  - id: instruction.show_by_id
    priority: 90
    modes: [instructions, all, events]
    # Noun optional: "show me <I-id>" is the same lookup as "show me the instruction <I-id>"
    # (requires: instruction_id still gates on an extracted *-I-* id).
    match: '\b(show|get|display|look\s*up|find|fetch|open|pull\s+up)\b.*\binstruction\b|\b(tell\s+me\s+about|details?\s+(?:for|of|on)|what\s+about)\b.*\binstruction\b|\binstruction\b\s+(?:id\s+)?\d{8}-[A-Z_]+-I-\d+|\b(show|get|display|look\s*up|find|fetch|open|pull\s+up|tell\s+me\s+about|details?\s+(?:for|of|on)|what\s+about)\b.*\d{8}-[A-Z_]+-I-\d+'
    exclude: '\bversions?\b|\bwho\s+created\b|\bwho\s+approv|\bstatus of\b|\bwhat is\s+the\s+status\b|\bcreate\b|\bdraft\b|\bpayments?\b|\beligible\b|\bcan\s+approv'
    requires:
      instruction_id: true
    query: instruction_detail_by_id
    formatter: instruction_detail_by_id

  # ── Payment by ID ────────────────────────────────────────────────────────
  - id: payment.creator_by_id
    priority: 100
    modes: [payments, all]
    match: '\b(who|which user)\s+created\b'
    exclude: '\bapprov'
    requires:
      payment_id: true
    query: payment_detail_by_id
    formatter: payment_creator_by_id

  - id: payment.status_by_id
    priority: 100
    modes: [payments, all]
    match: '\b(what is|what''s)\s+the\s+status\b|\bstatus of\b'
    requires:
      payment_id: true
    query: payment_detail_by_id
    formatter: payment_status_by_id

  - id: payment.creator_and_approver_by_id
    priority: 110
    modes: [payments, all]
    match: '\bwho\s+created\b.*\bwho\s+approv|\bwho\s+approv.*\bwho\s+created\b'
    requires:
      payment_id: true
    query: payment_detail_by_id
    formatter: payment_creator_and_approver_by_id

  - id: payment.show_by_id
    priority: 90
    modes: [payments, all, events]
    # Noun optional: "show me <P-id>" matches the same as "show me the payment <P-id>".
    match: '\b(show|get|display|look\s*up|find|fetch|open|pull\s+up)\b.*\bpayment\b|\b(tell\s+me\s+about|details?\s+(?:for|of|on)|what\s+about)\b.*\bpayment\b|\bpayment\b\s+(?:id\s+)?\d{8}-[A-Z]+-P-\d+|\b(show|get|display|look\s*up|find|fetch|open|pull\s+up|tell\s+me\s+about|details?\s+(?:for|of|on)|what\s+about)\b.*\d{8}-[A-Z]+-P-\d+'
    exclude: '\bversions?\b|\bwho\s+created\b|\bwho\s+approv|\bstatus of\b|\bwhat is\s+the\s+status\b|\bcreate\b|\bdraft\b|\binstructions?\b'
    requires:
      payment_id: true
    query: payment_detail_by_id
    formatter: payment_detail_by_id

  - id: instruction.versions_by_id
    priority: 105
    modes: [instructions, all]
    match: '\b(list|show|get|display|enumerate|all)\b.*\b(?:all\s+)?versions?\b|\bversions?\b.*\b(list|show|history)\b|\bversion\s+history\b'
    requires:
      instruction_id: true
    query: instruction_versions_by_id
    formatter: instruction_versions_table

  - id: payment.versions_by_id
    priority: 105
    modes: [payments, all]
    match: '\b(list|show|get|display|enumerate|all)\b.*\b(?:all\s+)?versions?\b|\bversions?\b.*\b(list|show|history)\b|\bversion\s+history\b'
    requires:
      payment_id: true
    query: payment_versions_by_id
    formatter: payment_versions_table

  # ── Instruction inventory / compliance ─────────────────────────────────────
  - id: instruction.list_by_status
    priority: 78
    modes: [instructions, all]
    match: '\b(list|show|get|display|find|enumerate)\b.*\binstructions?\b.*\b(submitted|approved|rejected|suspended|expired|cancelled|draft|used|pending)\b|\b(list|show|get|display|find|enumerate)\b.*\b(submitted|approved|rejected|suspended|expired|cancelled|draft|used|pending)\b.*\binstructions?\b'
    query: instruction_list_by_status
    formatter: instruction_inventory_table

  # Synonyms (single use / single-use / one-time / …) are handled by the shared
  # instruction_type taxonomy in cypher_builder — keep match verbs broad.
  - id: instruction.list_single_use
    priority: 80
    modes: [instructions, all]
    match: '\b(list|show|get|display|find|enumerate)\b.*\b(single[\s_-]*use|singleuse|one[\s_-]*time(?:[\s_-]*use)?|onetime(?:[\s_-]*use)?)\b|\b(single[\s_-]*use|singleuse|one[\s_-]*time(?:[\s_-]*use)?|onetime(?:[\s_-]*use)?)\b.*\b(list|show|get|display|find|enumerate)\b.*\binstructions?\b'
    exclude: '\bhow\s+many\b|\bcount\b|\bnumber\s+of\b'
    query: instruction_list_by_type
    formatter: instruction_inventory_table

  - id: instruction.list_standing
    priority: 80
    modes: [instructions, all]
    match: '\b(list|show|get|display|find|enumerate)\b.*\b(standing|recurring|open[\s_-]*ended|openended|ever[\s_-]*green)\b.*\binstructions?\b|\b(standing|recurring|open[\s_-]*ended|openended|ever[\s_-]*green)\b.*\binstructions?\b.*\b(list|show|get|display|find|enumerate)\b'
    exclude: '\bhow\s+many\b|\bcount\b|\bnumber\s+of\b'
    query: instruction_list_by_type
    formatter: instruction_inventory_table

  - id: instruction.created_by_user
    priority: 80
    modes: [instructions, all]
    match: '\b(which|what|list)\b.*\binstruction.*\b(create|created)\b|\binstruction.*\b(create|created)\s+by\b'
    requires:
      user_id: true
    query: instructions_created_by_user
    formatter: instruction_inventory_table

  - id: instruction.mutual_approval
    priority: 70
    modes: [instructions, all]
    match: '\bmutual\s+approv|\bapprov.*each\s+other'
    query: instruction_mutual_approval
    formatter: instruction_mutual_approval

  - id: instruction.cross_entity_reciprocal_approval
    priority: 72
    modes: [instructions, payments, events, all]
    match: '\banother\s+user.?s\s+instruction\b.*\bpayment\b|\bcross[- ]entity\b.*\bapprov'
    query: cross_entity_reciprocal_approval
    formatter: cross_entity_reciprocal_approval

  - id: instruction.self_approval
    priority: 70
    modes: [instructions, all]
    match: '\bself[- ]?approv|\bcreator\s+and\s+approver\s+are\s+the\s+same\b|\bsame\s+person\b.*\bapprov'
    query: instruction_self_approval
    formatter: instruction_compliance_table

  - id: instruction.duplicate_routes
    priority: 70
    modes: [instructions, all]
    match: '\bduplicate\b.*\b(route|instruction)|\bCONFLICTS_WITH\b|\bsame\s+creditor\s+account\b.*\bcurrency\b'
    query: instruction_duplicate_routes
    formatter: instruction_conflict_table

  - id: instruction.subordinate_approver
    priority: 75
    modes: [instructions, all]
    match: '\b(reports?\s+to|reporting\s+to|directly\s+reports?)\b.*\bcreator\b|\bapprov.*\b(reports?\s+to|subordinate)\b.*\bcreator\b'
    query: instruction_subordinate_approver
    formatter: instruction_compliance_table

  # ── Security events ────────────────────────────────────────────────────────
  - id: events.instruction_timeline_by_id
    priority: 100
    modes: [events, all]
    match: '\b(full\s+)?(security\s+event\s+)?timeline\b|\bfrom\s+creation\b.*\bapprov'
    requires:
      instruction_id: true
    query: instruction_security_event_timeline
    formatter: security_event_timeline

  - id: events.alerts_today_count
    priority: 60
    modes: [events, all]
    match: '\bhow\s+many\b.*\bALERT\b.*\btoday\b|\bhow\s+many\b.*\balert\b.*\bhappened\s+today\b'
    exclude: '\bpayment|\binstruction'
    query: alert_count_today
    formatter: alert_count_today

  - id: events.alert_list
    priority: 65
    modes: [events, all, instructions, payments]
    match: '\b(list|show|summarize|summarise|enumerate|display|all)\b.*\b(alerts?|policy\s+denials?|denials?|denied)\b|\b(alerts?|denials?)\b.*\b(list|show|summarize|summarise|enumerate|display|actor|action|events?)\b|\b(list|show|enumerate|display|all)\b.*\b(denial|denied)\b.*\bevents?\b'
    exclude: '\bhow\s+many\b|\bcount\b|\bnumber\s+of\b|\bgroup\b.*\bby\b'
    query: security_event_alert_list
    formatter: security_event_alert_list
