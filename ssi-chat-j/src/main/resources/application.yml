server:
  port: ${SERVER_PORT:8096}

spring:
  application:
    name: ssi-chat-j
  thymeleaf:
    cache: false
  ai:
    vertex:
      ai:
        gemini:
          project-id: ${GCP_PROJECT_ID:rag-demos-501323}
          location: ${GCP_REGION:us-central1}
          chat:
            options:
              model: ${VERTEX_GEMINI_MODEL:gemini-2.5-flash}
              temperature: 0.0
        embedding:
          project-id: ${GCP_PROJECT_ID:rag-demos-501323}
          location: ${GCP_REGION:us-central1}
          text:
            options:
              model: ${VERTEX_EMBEDDING_MODEL:text-embedding-004}
              task-type: RETRIEVAL_QUERY
              dimensions: ${EMBEDDING_DIMENSION:768}

chatj:
  payment-service-url: ${PAYMENT_SERVICE_URL:http://localhost:8093}
  instruction-service-url: ${INSTRUCTION_SERVICE_URL:http://localhost:8000}
  authorization-service-url: ${AUTHORIZATION_SERVICE_URL:http://localhost:8094}
  indexer-url: ${INDEXER_URL:http://localhost:8090}
  neo4j-uri: ${NEO4J_URI:bolt://localhost:7687}
  neo4j-user: ${NEO4J_USER:svc_chat}
  neo4j-password: ${NEO4J_PASSWORD:Password1!}
  multimodal-vector-index: ${MULTIMODAL_VECTOR_INDEX:multimodal_embedding}
  retrieval-limit: ${RETRIEVAL_LIMIT:8}
  zitadel-url: ${ZITADEL_URL:http://localhost:8080}
  zitadel-internal-url: ${ZITADEL_INTERNAL_URL:}
  zitadel-host-header: ${ZITADEL_HOST_HEADER:}
  zitadel-service-pat: ${ZITADEL_SERVICE_PAT:}
  zitadel-service-pat-file: ${ZITADEL_SERVICE_PAT_FILE:}
  oidc-issuer-url: ${OIDC_ISSUER_URL:http://localhost:8080}
  oidc-internal-url: ${OIDC_INTERNAL_URL:}
  oidc-audience: ${OIDC_AUDIENCE:policy-pilot}
  email-domain: ${EMAIL_DOMAIN:ssi.local}
  service-user-id: ${SERVICE_USER_ID:svc-chat}
  service-user-password: ${SERVICE_USER_PASSWORD:Password1!}
  chat-roles:
    - COMPLIANCE_ANALYST
    - COMPLIANCE_OFFICER
    - PLATFORM_ADMIN
    - PAYMENT_CREATOR
    - FUNDING_APPROVER
    - INSTRUCTION_CREATOR
    - INSTRUCTION_APPROVER

management:
  endpoints:
    web:
      exposure:
        # Health only — no Prometheus scrape endpoint (metrics leave via OTLP).
        include: health
  endpoint:
    prometheus:
      enabled: false
  metrics:
    tags:
      service: ssi-chat-j
    distribution:
      percentiles-histogram:
        http.server.request.duration: true
  otlp:
    metrics:
      export:
        # OtelEnvironmentPostProcessor remaps OTEL_EXPORTER_OTLP_* / OTEL_SDK_DISABLED.
        enabled: true
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
        protocol: ${OTEL_EXPORTER_OTLP_PROTOCOL:grpc}
        step: 15s
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
      transport: grpc
  tracing:
    sampling:
      probability: 1.0
  observations:
    key-values:
      application: ssi-chat-j

logging:
  level:
    com.sanjuthomas.policypilot: INFO
    org.springframework.ai: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [traceId=%X{traceId:-} spanId=%X{spanId:-}] %logger{36} - %msg%n"
