# Ownership: ssi-chat-j eligibility golden set (HTTP black-box against :8096).
# Copied from the Python eval bank so Java A/B does not depend on ssi-chat at runtime.
# Harness CLI (temporary): python -m regression.runner --golden <this file> --chat-url …
#
# Seed plan matches the shared harness shape so truncate+reload keeps entity
# bindings stable. With a warm stack, prefer --no-seed (fetch_context resolves ids).

version: 1
seed:
  steps:
  - action: run-policy-scenario
  - action: run-payment-policy-scenario
  - action: create-instructions
    count: 5
  - action: submit-instructions
    count: 5
  - action: approve-instructions
    count: 3
  - action: create-payments
    count: 5
  - action: submit-payments
    count: 4
  - action: approve-payments
    count: 2
  - action: reject-payments
    count: 1
  wait:
    min_security_events: 10
    min_multimodal_documents: 15
    timeout_seconds: 300
    poll_interval_seconds: 4

cases:
- id: golden_policies_eligible_approvers_payment
  mode: policies
  retrieval: eligibility
  tags: [golden, policies, eligibility, payment, ssi-chat-j]
  question: Who can approve payment {submitted_payment_id}?
  expect:
    requires_context: [submitted_payment_id]
    require_routing: true
    routing_path: eligibility
    cypher_class: none
    answer_synthesis: eligibility_api
    min_answer_length: 40
    answer_contains_any:
    - Live OPA
    - Users who can approve
    - already APPROVED
    - payment

- id: golden_policies_eligible_submitters_payment
  mode: policies
  retrieval: eligibility
  tags: [golden, policies, eligibility, submitters, payment, ssi-chat-j]
  question: Who can submit {draft_payment_id} for approval?
  expect:
    requires_context: [draft_payment_id]
    require_routing: true
    routing_path: eligibility
    cypher_class: none
    answer_synthesis: eligibility_api
    min_answer_length: 40
    answer_contains_any:
    - Live OPA
    - Users who can submit
    - PAYMENT_CREATOR
    - submit
    answer_not_contains:
    - FUNDING_APPROVER
    - Users who can approve this payment

- id: golden_policies_eligible_approvers_instruction
  mode: policies
  retrieval: eligibility
  tags: [golden, policies, eligibility, instruction, ssi-chat-j]
  question: Who can approve instruction {pending_instruction_id}?
  expect:
    requires_context: [pending_instruction_id]
    require_routing: true
    routing_path: eligibility
    cypher_class: none
    answer_synthesis: eligibility_api
    min_answer_length: 40
    answer_contains_any:
    - Live OPA
    - Users who can approve
    - already APPROVED
    - instruction

- id: golden_policies_amount_club_directory
  mode: policies
  retrieval: policy_directory
  tags: [golden, policies, policy_directory, amount_club, ssi-chat-j]
  question: Who has permission to approve payments worth more than $25 billion?
  expect:
    require_routing: true
    routing_path: policy_directory
    cypher_class: none
    answer_synthesis: policy_directory_api
    min_answer_length: 40
    answer_contains_any:
    - policy directory
    - UP_TO_
    - User ID
    - covering

- id: golden_policies_covering_lob_directory
  mode: policies
  retrieval: policy_directory
  tags: [golden, policies, policy_directory, covering_lob, ssi-chat-j]
  question: Which users have permission to approve payments covering FICC?
  expect:
    require_routing: true
    routing_path: policy_directory
    cypher_class: none
    answer_synthesis: policy_directory_api
    min_answer_length: 40
    answer_contains_any:
    - policy directory
    - FICC
    - FUNDING_APPROVER
    - User ID
    - covering
