x-otel-environment: &otel-environment
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_INSECURE: "true"
  OTEL_LOG_CONSOLE: "true"
  OTEL_DEPLOYMENT_ENVIRONMENT: development
  OTEL_METRIC_EXPORT_INTERVAL: "15000"

name: policy-pilot

services:
  # ── Observability mesh ──────────────────────────────────────────────────────
  # OTel Collector fans OTLP out to Prometheus (metrics), Loki (logs), Tempo
  # (traces). Modeled on sanjuthomas/observability-mesh-demo.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter (scraped by Prometheus)
    depends_on:
      - loki
      - tempo
    restart: unless-stopped
    networks:
      - security-event-net

  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - security-event-net

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    restart: unless-stopped
    networks:
      - security-event-net

  slo-catalog:
    image: sanjuthomas/observability-mesh-slo-catalog:latest
    container_name: slo-catalog
    environment:
      OBSERVABILITY_MESH_AUTH_ENABLED: "false"
      OBSERVABILITY_MESH_SLO_PROVISIONER_DATASOURCE_NAMES: prometheus
      PROMETHEUS_RELOAD_URL: http://prometheus:9090/-/reload
      OTEL_SDK_DISABLED: "true"
    ports:
      - "5433:5432"   # OpenSLO document store (Postgres)
      - "9096:9090"   # SLO author UI
      - "9097:9097"   # SLO provisioner UI
    volumes:
      - slo-catalog-pg:/var/lib/postgresql/data
      - prometheus-sloth-rules:/rules
      - ./observability/slo-catalog/seed-slos.sql:/docker-entrypoint-initdb.d/02-seed-slos.sql:ro
    restart: unless-stopped
    networks:
      - security-event-net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9099:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-sloth-rules:/etc/prometheus/rules-sloth
      - prometheus-data:/prometheus
    depends_on:
      - otel-collector
      - slo-catalog
    restart: unless-stopped
    networks:
      - security-event-net

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped
    networks:
      - security-event-net

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - security-event-net

  kafka-init:
    image: apache/kafka:3.9.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --bootstrap-server kafka:9092 \
          --topic instruction_security_events \
          --partitions 4 \
          --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --bootstrap-server kafka:9092 \
          --topic instructions \
          --partitions 4 \
          --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --bootstrap-server kafka:9092 \
          --topic payments \
          --partitions 4 \
          --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --bootstrap-server kafka:9092 \
          --topic payment_security_events \
          --partitions 4 \
          --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --bootstrap-server kafka:9092 \
          --topic connect-configs \
          --partitions 1 \
          --replication-factor 1 \
          --config cleanup.policy=compact
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --bootstrap-server kafka:9092 \
          --topic connect-offsets \
          --partitions 1 \
          --replication-factor 1 \
          --config cleanup.policy=compact
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --bootstrap-server kafka:9092 \
          --topic connect-status \
          --partitions 1 \
          --replication-factor 1 \
          --config cleanup.policy=compact
    networks:
      - security-event-net

  kafka-connect:
    build:
      context: ./kafka-connect
      dockerfile: Dockerfile
    container_name: kafka-connect
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: mongo-cdc-connect
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_REST_PORT: 8083
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 90s
    restart: unless-stopped
    networks:
      - security-event-net

  kafka-connect-init:
    image: curlimages/curl:8.12.1
    container_name: kafka-connect-init
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./kafka-connect/connectors:/connectors:ro
      - ./kafka-connect/register-connectors.sh:/register-connectors.sh:ro
    entrypoint: ["/bin/sh", "/register-connectors.sh"]
    restart: "no"
    networks:
      - security-event-net

  opa:
    image: openpolicyagent/opa:1.17.1
    container_name: opa-server
    ports:
      - "8181:8181"
    command:
      - run
      - --server
      - --addr
      - :8181
      - --log-level
      - info
      - /policies
    volumes:
      - ./opa-policy-seed/policies:/policies:ro
    restart: unless-stopped
    networks:
      - security-event-net

  opa-policy-seed:
    build: ./opa-policy-seed
    container_name: opa-policy-seed
    depends_on:
      - opa
    environment:
      OPA_URL: http://opa:8181
      POLICIES_DIR: /policies
    volumes:
      - ./opa-policy-seed/policies:/policies:ro
    restart: "no"
    networks:
      - security-event-net

  # Enterprise required for RBAC (per-service least-privilege accounts).
  # Local demo: accept evaluation license. Admin remains neo4j/devpassword for Browser.
  # SINGLE/PRIMARY settings keep a one-node Enterprise instance (no cluster topology).
  neo4j:
    image: neo4j:5.26.0-enterprise
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_AUTH: neo4j/devpassword
      NEO4J_initial_server_mode__constraint: PRIMARY
      NEO4J_server_cluster_system__database__mode: PRIMARY
      NEO4J_initial_dbms_default__primaries__count: "1"
      NEO4J_initial_dbms_default__secondaries__count: "0"
      NEO4J_server_memory_heap_initial__size: 8g
      NEO4J_server_memory_heap_max__size: 16g
      NEO4J_server_memory_pagecache_size: 1g
    volumes:
      - neo4j-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - security-event-net

  neo4j-init:
    image: neo4j:5.26.0-enterprise
    container_name: neo4j-init
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./scripts/neo4j-init-users.sh:/neo4j-init-users.sh:ro
      - ./neo4j-graph-model/init-service-accounts.cypher:/init-service-accounts.cypher:ro
    entrypoint: ["/bin/bash", "/neo4j-init-users.sh"]
    environment:
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_HOST: neo4j
      NEO4J_ADMIN_USER: neo4j
      NEO4J_ADMIN_PASSWORD: devpassword
      NEO4J_CHAT_PASSWORD: ${NEO4J_CHAT_PASSWORD:-Password1!}
      NEO4J_INDEXER_PASSWORD: ${NEO4J_INDEXER_PASSWORD:-Password1!}
      NEO4J_HARNESS_PASSWORD: ${NEO4J_HARNESS_PASSWORD:-Password1!}
      NEO4J_INIT_CYPHER: /init-service-accounts.cypher
    restart: "no"
    networks:
      - security-event-net

  mongodb:
    image: mongo:7
    container_name: mongodb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - security-event-net

  mongo-init:
    image: mongo:7
    container_name: mongo-init
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        mongosh --host mongodb:27017 --quiet --eval '
          try {
            const status = rs.status();
            if (status.ok !== 1) throw new Error("not ready");
            quit(0);
          } catch (e) {
            rs.initiate({_id: "rs0", members: [{_id: 0, host: "mongodb:27017"}]});
          }
        '
        until mongosh --host mongodb:27017 --quiet --eval 'rs.isMaster().ismaster' | grep -q true; do
          sleep 1
        done
    networks:
      - security-event-net

  instruction-service:
    build:
      context: .
      dockerfile: instruction-service/Dockerfile
    container_name: instruction-service
    ports:
      - "8000:8000"
    environment:
      <<: *otel-environment
      OTEL_SERVICE_NAME: instruction-service
      MONGODB_URI: mongodb://mongodb:27017/?replicaSet=rs0
      MONGODB_DATABASE: ssi_cash_instructions
      SECURITY_EVENTS_DATABASE: security_events
      SECURITY_EVENTS_COLLECTION: instruction_service
      AUTHORIZATION_SERVICE_URL: http://authorization-service:8094
      SERVICE_USER_ID: svc-instruction
      SERVICE_USER_PASSWORD: Password1!
      OIDC_ISSUER_URL: http://localhost:8080
      OIDC_INTERNAL_URL: http://zitadel-proxy
      OIDC_AUDIENCE: policy-pilot
      ZITADEL_INTERNAL_URL: http://zitadel-proxy
      ZITADEL_SERVICE_PAT_FILE: /zitadel/bootstrap/login-client.pat
      AUTH_MODE: jwt
      SEQUENCE_SERVICE_URL: http://sequence-service:8095
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
      - ./instruction-service/src/inst/static:/usr/local/lib/python3.12/site-packages/inst/static:ro
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      opa-policy-seed:
        condition: service_completed_successfully
      sequence-service:
        condition: service_started
      # PAT is written during ZITADEL first-instance bootstrap; wait so Settings
      # does not load with an empty /zitadel/bootstrap/login-client.pat.
      zitadel-api:
        condition: service_healthy
      zitadel-login:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - security-event-net

  ssi-indexer:
    build:
      context: .
      dockerfile: ssi-indexer/Dockerfile
    container_name: ssi-indexer
    ports:
      - "8090:8090"
    environment:
      <<: *otel-environment
      OTEL_SERVICE_NAME: ssi-indexer
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-rag-demos-501323}
      GCP_REGION: ${GCP_REGION:-us-central1}
      VERTEX_EMBEDDING_MODEL: ${VERTEX_EMBEDDING_MODEL:-text-embedding-004}
      VERTEX_GEMINI_MODEL: ${VERTEX_GEMINI_MODEL:-gemini-2.5-flash}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-sa.json
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_INSTRUCTION_SECURITY_EVENTS_TOPIC: instruction_security_events
      KAFKA_INSTRUCTION_SECURITY_EVENTS_CONSUMER_GROUP: instruction-security-event-etl
      KAFKA_INSTRUCTION_TOPIC: instructions
      KAFKA_INSTRUCTION_CONSUMER_GROUP: ssi-instruction-etl
      KAFKA_PAYMENT_SECURITY_EVENTS_TOPIC: payment_security_events
      KAFKA_PAYMENT_SECURITY_EVENTS_CONSUMER_GROUP: payment-security-event-etl
      KAFKA_PAYMENTS_TOPIC: payments
      KAFKA_PAYMENTS_CONSUMER_GROUP: payment-fact-etl
      DLQ_MONGODB_URI: mongodb://mongodb:27017/?replicaSet=rs0
      DLQ_MONGODB_DATABASE: ssi_indexer_dlq
      DLQ_MONGODB_COLLECTION: dead_letters
      DLQ_SCHEDULER_INTERVAL_SECONDS: "300"
      INDEX_LAG_BANNER_THRESHOLD: "10"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: svc_indexer
      NEO4J_PASSWORD: ${NEO4J_INDEXER_PASSWORD:-Password1!}
      GRAPH_MODEL_DIR: /app/neo4j-graph-model
      OIDC_ISSUER_URL: http://localhost:8080
      OIDC_INTERNAL_URL: http://zitadel-api:8080
      OIDC_AUDIENCE: policy-pilot
      ZITADEL_INTERNAL_URL: http://zitadel-api:8080
      ZITADEL_SERVICE_PAT_FILE: /zitadel/bootstrap/login-client.pat
      AUTH_MODE: jwt
      SEARCH_PROFILES_DIR: /app/search-profiles
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
      - ./neo4j-graph-model:/app/neo4j-graph-model:ro
      - ./ssi-indexer/search-profiles:/app/search-profiles:ro
      - ${GCP_SA_KEY_PATH:-${HOME}/.config/gcloud/rag-demos-501323-vertex-client-key.json}:/run/secrets/gcp-sa.json:ro
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka-connect-init:
        condition: service_completed_successfully
      neo4j:
        condition: service_healthy
      neo4j-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      instruction-service:
        condition: service_started
      payment-service:
        condition: service_started
      zitadel-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - security-event-net

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "8093:8093"
    environment:
      <<: *otel-environment
      OTEL_SERVICE_NAME: payment-service
      MONGODB_URI: mongodb://mongodb:27017/?replicaSet=rs0
      MONGODB_DATABASE: ssi_cash_activities
      MONGODB_COLLECTION: payments
      SECURITY_EVENTS_DATABASE: security_events
      SECURITY_EVENTS_COLLECTION: payment_service
      AUTHORIZATION_SERVICE_URL: http://authorization-service:8094
      INSTRUCTION_SERVICE_URL: http://instruction-service:8000
      SERVICE_USER_ID: svc-payment
      SERVICE_USER_PASSWORD: Password1!
      OIDC_ISSUER_URL: http://localhost:8080
      OIDC_INTERNAL_URL: http://zitadel-proxy
      OIDC_AUDIENCE: policy-pilot
      ZITADEL_INTERNAL_URL: http://zitadel-proxy
      ZITADEL_SERVICE_PAT_FILE: /zitadel/bootstrap/login-client.pat
      AUTH_MODE: jwt
      SEQUENCE_SERVICE_URL: http://sequence-service:8095
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
      - ./payment-service/src/ps/static:/usr/local/lib/python3.12/site-packages/ps/static:ro
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      opa-policy-seed:
        condition: service_completed_successfully
      instruction-service:
        condition: service_started
      authorization-service:
        condition: service_started
      zitadel-api:
        condition: service_healthy
      zitadel-login:
        condition: service_healthy
      sequence-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - security-event-net

  ssi-demo-harness:
    build:
      context: .
      dockerfile: ssi-demo-harness/Dockerfile
    container_name: ssi-demo-harness
    ports:
      - "8091:8091"
    environment:
      INSTRUCTION_SERVICE_URL: http://instruction-service:8000
      PAYMENT_SERVICE_URL: http://payment-service:8093
      AUTHORIZATION_SERVICE_URL: http://authorization-service:8094
      MONGODB_URI: mongodb://mongodb:27017/?replicaSet=rs0
      OIDC_ISSUER_URL: http://localhost:8080
      OIDC_INTERNAL_URL: http://zitadel-proxy
      OIDC_AUDIENCE: policy-pilot
      ZITADEL_URL: http://zitadel-proxy
      ZITADEL_INTERNAL_URL: http://zitadel-proxy
      ZITADEL_HOST_HEADER: localhost
      ZITADEL_SERVICE_PAT_FILE: /zitadel/bootstrap/login-client.pat
      SERVICE_USER_ID: svc-chat
      SERVICE_USER_PASSWORD: Password1!
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
      - ./ssi-demo-harness/src/harness/static:/usr/local/lib/python3.12/site-packages/harness/static:ro
    depends_on:
      instruction-service:
        condition: service_started
      payment-service:
        condition: service_started
      authorization-service:
        condition: service_started
      zitadel-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - security-event-net

  authorization-service:
    build:
      context: .
      dockerfile: authorization-service/Dockerfile
    container_name: authorization-service
    ports:
      - "8094:8094"
    environment:
      <<: *otel-environment
      OTEL_SERVICE_NAME: authorization-service
      OPA_URL: http://opa:8181
      EMAIL_DOMAIN: ssi.local
      OIDC_ISSUER_URL: http://localhost:8080
      OIDC_INTERNAL_URL: http://zitadel-proxy
      OIDC_AUDIENCE: policy-pilot
      ZITADEL_INTERNAL_URL: http://zitadel-proxy
      ZITADEL_SERVICE_PAT_FILE: /zitadel/bootstrap/login-client.pat
      AUTH_MODE: jwt
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
      - ./authorization-service/src/authz/static:/usr/local/lib/python3.12/site-packages/authz/static:ro
    depends_on:
      opa-policy-seed:
        condition: service_completed_successfully
      zitadel-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - security-event-net

  sequence-service:
    build:
      context: .
      dockerfile: sequence-service/Dockerfile
    container_name: sequence-service
    ports:
      - "8095:8095"
    environment:
      <<: *otel-environment
      OTEL_SERVICE_NAME: sequence-service
      MONGODB_URI: mongodb://mongodb:27017/?replicaSet=rs0
      MONGODB_DATABASE: ssi_sequences
      MONGODB_COLLECTION: sequence_counters
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - security-event-net

  # HTTP bridge for shared/cypher_builder — used by ssi-chat-j (Maven on :8096).
  cypher-builder-svc:
    build:
      context: .
      dockerfile: cypher-builder-svc/Dockerfile
    container_name: cypher-builder-svc
    ports:
      - "8097:8097"
    environment:
      <<: *otel-environment
      OTEL_SERVICE_NAME: cypher-builder-svc
    restart: unless-stopped
    networks:
      - security-event-net

  ssi-chat:
    build:
      context: .
      dockerfile: ssi-chat/Dockerfile
    container_name: ssi-chat
    ports:
      - "8092:8092"
    environment:
      <<: *otel-environment
      OTEL_SERVICE_NAME: ssi-chat
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-rag-demos-501323}
      GCP_REGION: ${GCP_REGION:-us-central1}
      VERTEX_EMBEDDING_MODEL: ${VERTEX_EMBEDDING_MODEL:-text-embedding-004}
      VERTEX_GEMINI_MODEL: ${VERTEX_GEMINI_MODEL:-gemini-2.5-flash}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-sa.json
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: svc_chat
      NEO4J_PASSWORD: ${NEO4J_CHAT_PASSWORD:-Password1!}
      PAYMENT_SERVICE_URL: http://payment-service:8093
      INSTRUCTION_SERVICE_URL: http://instruction-service:8000
      AUTHORIZATION_SERVICE_URL: http://authorization-service:8094
      EMAIL_DOMAIN: ssi.local
      INDEXER_URL: http://ssi-indexer:8090
      ZITADEL_URL: http://zitadel-proxy
      ZITADEL_HOST_HEADER: localhost
      ZITADEL_INTERNAL_URL: http://zitadel-proxy
      ZITADEL_SERVICE_PAT_FILE: /zitadel/bootstrap/login-client.pat
      OIDC_ISSUER_URL: http://localhost:8080
      OIDC_INTERNAL_URL: http://zitadel-proxy
      OIDC_AUDIENCE: policy-pilot
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
      - ./ssi-chat/src/chat_application/static:/usr/local/lib/python3.12/site-packages/chat_application/static:ro
      - ${GCP_SA_KEY_PATH:-${HOME}/.config/gcloud/rag-demos-501323-vertex-client-key.json}:/run/secrets/gcp-sa.json:ro
    depends_on:
      neo4j:
        condition: service_healthy
      neo4j-init:
        condition: service_completed_successfully
      payment-service:
        condition: service_started
      instruction-service:
        condition: service_started
      zitadel-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - security-event-net

  # ZITADEL (local dev only — change masterkey/passwords before any real deployment)
  # Console: http://localhost:8080/ui/console
  zitadel-postgres:
    image: postgres:17.2-alpine
    container_name: zitadel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zitadel
    volumes:
      - zitadel-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d zitadel -U postgres"]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 20s
    networks:
      - security-event-net

  zitadel-api:
    image: ghcr.io/zitadel/zitadel:v4.13.0
    container_name: zitadel-api
    restart: unless-stopped
    user: "0"
    command: start-from-init --masterkey "MasterkeyNeedsToHave32Characters"
    environment:
      ZITADEL_PORT: 8080
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_DATABASE_POSTGRES_DSN: postgresql://postgres:postgres@zitadel-postgres:5432/zitadel?sslmode=disable
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Automatically Initialized IAM_LOGIN_CLIENT
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: http://localhost:8080/ui/v2/login/
      ZITADEL_OIDC_DEFAULTLOGINURLV2: http://localhost:8080/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: http://localhost:8080/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: http://localhost:8080/ui/v2/login/login?samlRequest=
      ZITADEL_LOGSTORE_ACCESS_STDOUT_ENABLED: "true"
      ZITADEL_INSTRUMENTATION_TRACE_EXPORTER_TYPE: none
      ZITADEL_CACHES_CONNECTORS_REDIS_ENABLED: "false"
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:rw
    depends_on:
      zitadel-postgres:
        condition: service_healthy
    networks:
      - security-event-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=security-event-net
      - traefik.http.services.zitadel-api.loadbalancer.server.port=8080
      - traefik.http.services.zitadel-api.loadbalancer.server.scheme=h2c
      - traefik.http.middlewares.zitadel-strip-api.stripprefix.prefixes=/api
      - traefik.http.middlewares.zitadel-strip-api.stripprefix.forceSlash=false
      - traefik.http.routers.zitadel-api-alias-web.rule=Host(`localhost`) && PathPrefix(`/api`)
      - traefik.http.routers.zitadel-api-alias-web.entrypoints=web
      - traefik.http.routers.zitadel-api-alias-web.middlewares=zitadel-strip-api
      - traefik.http.routers.zitadel-api-alias-web.service=zitadel-api
      - traefik.http.routers.zitadel-api-alias-web.priority=200
      - traefik.http.routers.zitadel-canonical-web.rule=Host(`localhost`) && !PathPrefix(`/ui/v2/login`) && !PathPrefix(`/api`) && !Path(`/`)
      - traefik.http.routers.zitadel-canonical-web.entrypoints=web
      - traefik.http.routers.zitadel-canonical-web.service=zitadel-api
      - traefik.http.routers.zitadel-canonical-web.priority=100

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:v4.13.0
    container_name: zitadel-login
    restart: unless-stopped
    user: "0"
    environment:
      ZITADEL_API_URL: http://zitadel-api:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: Host:localhost,X-Forwarded-Proto:http
    healthcheck:
      test:
        - CMD
        - /bin/sh
        - -c
        - node /app/healthcheck.mjs http://localhost:3000/ui/v2/login/healthy
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
    depends_on:
      zitadel-api:
        condition: service_healthy
    networks:
      - security-event-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=security-event-net
      - traefik.http.services.zitadel-login.loadbalancer.server.port=3000
      - traefik.http.middlewares.zitadel-root-rewrite.replacepath.path=/ui/v2/login/
      - traefik.http.routers.zitadel-root-web.rule=Host(`localhost`) && Path(`/`)
      - traefik.http.routers.zitadel-root-web.entrypoints=web
      - traefik.http.routers.zitadel-root-web.middlewares=zitadel-root-rewrite
      - traefik.http.routers.zitadel-root-web.service=zitadel-login
      - traefik.http.routers.zitadel-root-web.priority=400
      - traefik.http.routers.zitadel-login-web.rule=Host(`localhost`) && PathPrefix(`/ui/v2/login`)
      - traefik.http.routers.zitadel-login-web.entrypoints=web
      - traefik.http.routers.zitadel-login-web.service=zitadel-login
      - traefik.http.routers.zitadel-login-web.priority=250

  zitadel-proxy:
    image: traefik:v3.6.8
    container_name: zitadel-proxy
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=security-event-net
      - --entrypoints.web.address=:80
      - --api.dashboard=false
      - --api.insecure=false
      - --ping=true
      - --ping.entrypoint=web
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "8080:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      zitadel-api:
        condition: service_healthy
      zitadel-login:
        condition: service_healthy
    networks:
      - security-event-net

networks:
  security-event-net:
    name: security-event-net

volumes:
  kafka-data:
  neo4j-data:
  mongo-data:
  zitadel-postgres-data:
  zitadel-bootstrap:
  loki-data:
  tempo-data:
  prometheus-data:
  prometheus-sloth-rules:
  slo-catalog-pg:
  grafana-data:
