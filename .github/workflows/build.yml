name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - instruction-service
          - payment-service
          - authorization-service
          - sequence-service
          - ssi-chat
          - ssi-indexer
          - ssi-demo-harness

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Lint
        working-directory: ${{ matrix.service }}
        run: ruff check src/ --select E,F,W,I --ignore E501

  # ── Unit test coverage (≥80% except ssi-chat 70%; excludes test harness) ──
  test-coverage:
    name: Coverage — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: instruction-service
            package: inst
            extra: dev
            fail_under: 80
          - service: payment-service
            package: ps
            extra: dev
            fail_under: 80
          - service: authorization-service
            package: authz
            extra: dev
            fail_under: 80
          - service: sequence-service
            package: seq
            extra: dev
            fail_under: 80
          - service: ssi-indexer
            package: etl
            extra: dev
            fail_under: 80
          - service: ssi-chat
            package: chat_application
            extra: regression
            # Fixture RouterDecision contract; no Gemini in CI (issue #13).
            fail_under: 70
          - service: shared/telemetry
            package: telemetry
            extra: dev
            fail_under: 80
          - service: shared/platform_auth
            package: platform_auth
            extra: dev
            fail_under: 80
          - service: shared/sequence_client
            package: sequence_client
            extra: dev
            fail_under: 80
          - service: shared/authz_client
            package: authz_client
            extra: dev
            fail_under: 80
          - service: shared/cypher_builder
            package: cypher_builder
            extra: dev
            fail_under: 80
          - service: shared/vertex_client
            package: vertex_client
            extra: dev
            fail_under: 80
          - service: shared/zitadel_directory
            package: zitadel_directory
            extra: dev
            fail_under: 80

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared packages
        # Application services depend on these; for shared/* matrix rows this is a no-op install of siblings.
        run: |
          pip install --quiet \
            ./shared/telemetry \
            ./shared/platform_auth \
            ./shared/sequence_client \
            ./shared/authz_client \
            ./shared/cypher_builder \
            ./shared/vertex_client \
            ./shared/zitadel_directory

      - name: Install and run tests with coverage
        working-directory: ${{ matrix.service }}
        run: |
          pip install --quiet -e ".[${{ matrix.extra }}]"
          pytest --cov=${{ matrix.package }} --cov-report=term-missing --cov-fail-under=${{ matrix.fail_under }}

  # ── Java / Maven (ssi-chat-j A/B experiment) ───────────────────────────────
  maven-ssi-chat-j:
    name: Maven — ssi-chat-j
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test, package, and coverage (≥80%)
        working-directory: ssi-chat-j
        run: mvn -B verify

  # ── Docker build ───────────────────────────────────────────────────────────
  docker-build:
    name: Docker build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: instruction-service
            context: .
            dockerfile: instruction-service/Dockerfile
          - service: payment-service
            context: .
            dockerfile: payment-service/Dockerfile
          - service: authorization-service
            context: .
            dockerfile: authorization-service/Dockerfile
          - service: sequence-service
            context: .
            dockerfile: sequence-service/Dockerfile
          - service: ssi-chat
            context: .
            dockerfile: ssi-chat/Dockerfile
          - service: ssi-chat-j
            context: .
            dockerfile: ssi-chat-j/Dockerfile
          - service: ssi-indexer
            context: .
            dockerfile: ssi-indexer/Dockerfile
          - service: ssi-demo-harness
            context: .
            dockerfile: ssi-demo-harness/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ── OPA policy unit tests (SoD / approval rules) ───────────────────────────
  opa-test:
    name: OPA policy tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Rego unit tests
        run: |
          docker run --rm --platform linux/amd64 \
            -v "${{ github.workspace }}/opa-policy-seed/policies:/policies:ro" \
            openpolicyagent/opa:1.4.2 \
            test /policies -v
