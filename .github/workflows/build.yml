name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - instruction-lifecycle-manager
          - security-event-chat
          - security-event-qdrant-etl
          - security-event-test-harness

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Lint
        working-directory: ${{ matrix.service }}
        run: ruff check src/ --select E,F,W,I --ignore E501

  # ── Unit test coverage (≥70%, excludes test harness) ───────────────────────
  test-coverage:
    name: Coverage — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: instruction-lifecycle-manager
            package: ilm
            extra: dev
          - service: payment-service
            package: ps
            extra: dev
          - service: security-event-qdrant-etl
            package: etl
            extra: dev
          - service: security-event-chat
            package: chat_application
            extra: regression

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and run tests with coverage
        working-directory: ${{ matrix.service }}
        run: |
          pip install --quiet -e ".[${{ matrix.extra }}]"
          pytest --cov=${{ matrix.package }} --cov-report=term-missing --cov-fail-under=70

  # ── Docker build ───────────────────────────────────────────────────────────
  docker-build:
    name: Docker build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: instruction-lifecycle-manager
            context: instruction-lifecycle-manager
          - service: security-event-chat
            context: security-event-chat
          - service: security-event-qdrant-etl
            context: security-event-qdrant-etl
          - service: security-event-test-harness
            context: security-event-test-harness

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          push: false
          tags: ${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
